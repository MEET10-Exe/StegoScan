<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StegoScan Login</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#0d1117;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{
            width:380px;
            background:#161b22;
            padding:35px;
            border-radius:15px;
            box-shadow:0 0 25px #00ff99;
            text-align:center;
        }

        h1{
            color:#00ff99;
            margin-bottom:10px;
        }

        p{
            color:#c9d1d9;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            margin-bottom:20px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:12px;
            background:#00ff99;
            border:none;
            border-radius:8px;
            font-size:17px;
            font-weight:bold;
            cursor:pointer;
        }

        button:hover{
            background:#00cc77;
        }

        .msg{
            color:red;
            margin-bottom:15px;
        }
    </style>

</head>
<body>

<div class="login-box">

    <h1>StegoScan</h1>
    <p>Cyber Security Hidden Data Detector</p>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
        <div class="msg">
            {{ messages[0] }}
        </div>
    {% endif %}
    {% endwith %}

    <form method="POST">

        <input
            type="text"
            name="username"
            placeholder="Enter Username"
            required
        >

        <button type="submit">
            Login
        </button>

    </form>

</div>

</body>
</html>
