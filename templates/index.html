<!DOCTYPE html>
<html>
<head>
<title>Login - StegoScan SaaS</title>

<style>
body {
    margin: 0;
    background: #0b0f19;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    background: #161b22;
    padding: 30px;
    border-radius: 15px;
    width: 300px;
    box-shadow: 0 0 20px #00ffcc33;
    text-align: center;
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    background: black;
    border: 1px solid #00ffcc;
    color: #00ffcc;
}

button {
    width: 100%;
    padding: 10px;
    background: #00ffcc;
    border: none;
    cursor: pointer;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="box">
    <h2>🛡 StegoScan Login</h2>

    <form method="POST">
        <input type="text" name="username" placeholder="Enter Username" required>
        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
