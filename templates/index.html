<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StegoScan SaaS</title>

<style>
body {
    background: #0b0f19;
    color: white;
    font-family: Arial;
    padding: 20px;
}

.card {
    background: #161b22;
    padding: 15px;
    margin-top: 15px;
    border-radius: 12px;
}

button {
    background: #00ffcc;
    border: none;
    padding: 10px;
    cursor: pointer;
    font-weight: bold;
}

input {
    padding: 10px;
}

.bar {
    height: 10px;
    background: #00ffcc;
    width: 0%;
    transition: 0.5s;
}

.badge {
    padding: 5px 10px;
    border-radius: 5px;
    display: inline-block;
}

.HIGH { background: red; }
.MEDIUM { background: orange; }
.LOW { background: green; }
</style>
</head>

<body>

<h1>🛡 StegoScan SaaS</h1>
<p>Total Scans: {{ total_scans }}</p>

<form method="POST" enctype="multipart/form-data">
    <input type="file" name="file" required>
    <button type="submit">SCAN</button>
</form>

{% if image_path %}
<div class="card">
    <h3>Uploaded Image</h3>
    <img src="/{{ image_path }}" width="250">
</div>
{% endif %}

{% if result %}
<div class="card">

    <h3>Status:
        <span class="badge {{ result.status.split()[0] }}">
            {{ result.status }}
        </span>
    </h3>

    {% if result.message %}
        <p>{{ result.message }}</p>
    {% endif %}

    <p>Risk: {{ result.percentage }}%</p>

    <p>Score: {{ result.security_score }}/100</p>

    <div class="bar" data-value="{{ result.percentage }}"></div>

</div>
{% endif %}

<script>
document.querySelectorAll(".bar").forEach(b => {
    let v = parseFloat(b.dataset.value || 0);
    if (v < 0) v = 0;
    if (v > 100) v = 100;
    b.style.width = v + "%";
});
</script>

</body>
</html>
