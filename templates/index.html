<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body{
background:#0b0f19;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
color:white;
}

.box{
background:#161b22;
padding:30px;
border-radius:15px;
width:300px;
text-align:center;
box-shadow:0 0 20px #00ffcc33;
}

input{
width:100%;
padding:10px;
margin:10px 0;
background:black;
border:1px solid #00ffcc;
color:#00ffcc;
}

button{
width:100%;
padding:10px;
background:#00ffcc;
border:none;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
<h2>🛡 SaaS Login</h2>

<form method="POST">
<input name="username" placeholder="Enter name" required>
<button>LOGIN</button>
</form>

</div>

</body>
</html>
